<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>小可的神秘茶会 ✨</title>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <button class="new-chat-btn" id="newChatBtn">＋ 新对话</button>
            <div class="conversation-list" id="conversationList"></div>
        </aside>

        <div class="chat-card">
            <div class="chat-header">
                <div class="brand">
                    <div class="avatar-logo">
                        <img src="img/bg.png" alt="Logo"
                            onerror="this.onerror=null;this.style.display='none';this.parentElement.innerHTML='<span style=font-size:22px>🔮</span>';this.parentElement.style.display='flex';this.parentElement.style.alignItems='center';this.parentElement.style.justifyContent='center';">
                    </div>
                    <div class="title">
                        <h1>欢迎来到小可的茶会 🍬</h1>
                        <p>欲知后事，日夜观星</p>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <textarea class="message-input" id="messageInput" placeholder="向 小可 发送消息" rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <span class="send-icon">↑</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
    (function() {
        // ==================== 配置 ====================
        const API_BASE = '/api';
        const AI_AVATAR = 'img/AI.png';
        const USER_AVATAR = 'img/user.png';

        // DOM
        const convListEl = document.getElementById('conversationList');
        const newChatBtn = document.getElementById('newChatBtn');
        const messagesContainer = document.getElementById('chatMessages');
        const emptyState = document.getElementById('emptyState');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        let conversations = [];
        let currentConvId = null;
        let isWaiting = false;
        let typingEl = null;

        // ==================== 工具函数 ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        function avatarHtml(src, role) {
            const emoji = role === 'user' ? '🌟' : '✨';
            return `<div class="msg-avatar">
                <img src="${src}" alt="${role}"
                    onerror="this.onerror=null;this.parentElement.innerHTML='<span class=fallback-emoji>${emoji}</span>';this.parentElement.style.background='linear-gradient(135deg,#b77eff,#f29bc7)';">
            </div>`;
        }

        // 将一条聊天消息添加到消息容器中
        const appendMessage = (role, content) => {
            if (emptyState) emptyState.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = avatarHtml(role === 'user' ? USER_AVATAR : AI_AVATAR, role) +
                `<div class="bubble">${escapeHtml(content)}</div>`;
            messagesContainer.appendChild(div);
            scrollToBottom();
        };

        // 以打字机动画显示AI的回复
        const typeAssistantMessage = content => {
            if (emptyState) emptyState.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = avatarHtml(AI_AVATAR, 'ai') + `<div class="bubble"></div>`;
            messagesContainer.appendChild(div);

            const bubble = div.querySelector('.bubble');
            let index = 0;
            return new Promise(resolve => {
                const typeNext = () => {
                    bubble.textContent = content.slice(0, ++index);
                    scrollToBottom();
                    if (index < content.length) {
                        setTimeout(typeNext, 25);
                    } else {
                        resolve();
                    }
                };
                typeNext();
            });
        };

        // 删除所有可见消息并恢复空状态
        const clearMessagesUI = () => {
            messagesContainer.querySelectorAll('.message, .typing-indicator').forEach(el => el.remove());
            if (emptyState) emptyState.style.display = 'flex';
        };

        // 为AI创建打字指示器元素
        const createTypingIndicator = () => {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typingIndicator';
            div.innerHTML = avatarHtml(AI_AVATAR, 'ai') +
                `<div class="typing-indicator">
                    <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
                    <span style="margin-left:4px">小可思考中</span>
                </div>`;
            return div;
        };

        // 在消息列表中显示AI的正在输入指示器
        const showTyping = () => {
            removeTyping();
            if (emptyState) emptyState.style.display = 'none';
            typingEl = createTypingIndicator();
            messagesContainer.appendChild(typingEl);
            scrollToBottom();
        };

        // 如果存在，请移除输入指示器。
        const removeTyping = () => {
            if (typingEl?.parentNode) {
                typingEl.remove();
                typingEl = null;
            }
        };

        // ==================== API 调用 ====================
        async function apiFetch(url, options = {}) {
            const resp = await fetch(url, options);
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({ detail: resp.statusText }));
                throw new Error(err.detail || resp.statusText);
            }
            return resp.json();
        }

        async function loadConversations() {
            conversations = await apiFetch(`${API_BASE}/conversations`);
            renderConversationList();
        }

        function renderConversationList() {
            convListEl.innerHTML = '';
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = `conv-item${currentConvId === conv.id ? ' active' : ''}`;
                item.innerHTML = `
                    <span class="conv-title" data-id="${conv.id}">${escapeHtml(conv.title)}</span>
                    <button class="conv-delete" data-id="${conv.id}" title="删除">×</button>`;
                convListEl.appendChild(item);
            });
        }

        async function loadMessages(convId) {
            clearMessagesUI();
            const msgs = await apiFetch(`${API_BASE}/conversations/${convId}/messages`);
            msgs.forEach(m => appendMessage(m.role, m.content));
        }

        async function switchConversation(convId) {
            currentConvId = convId;
            renderConversationList();
            await loadMessages(convId);
            messageInput.focus();
        }

        async function createNewConversation() {
            const newConv = await apiFetch(`${API_BASE}/conversations`, { method: 'POST' });
            conversations.unshift(newConv);
            currentConvId = newConv.id;
            renderConversationList();
            messageInput.focus();
        }

        async function deleteConversation(convId) {
            await apiFetch(`${API_BASE}/conversations/${convId}`, { method: 'DELETE' });
            conversations = conversations.filter(c => c.id !== convId);
            if (currentConvId === convId) {
                currentConvId = null;
                clearMessagesUI();
            }
            renderConversationList();
            // 如果还有对话且没有选中，自动选中第一个
            if (conversations.length > 0 && !currentConvId) {
                switchConversation(conversations[0].id);
            } else if (conversations.length === 0) {
                // 所有对话都删光了，自动创建一个新对话
                await createNewConversation();
                clearMessagesUI();
            }
        }

        // ==================== 发送消息（无对话时自动创建） ====================
        async function handleSend() {
            if (isWaiting) return;
            const raw = messageInput.value.trim();
            if (!raw) return;

            // 如果没有选中对话，自动创建一个
            if (!currentConvId) {
                try {
                    await createNewConversation();
                } catch (err) {
                    alert('创建对话失败: ' + err.message);
                    return;
                }
            }

            messageInput.value = '';
            messageInput.style.height = 'auto';

            appendMessage('user', raw);
            isWaiting = true;
            sendBtn.classList.add('disabled');
            showTyping();

            try {
                const data = await apiFetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ conversation_id: currentConvId, message: raw })
                });
                removeTyping();
                await typeAssistantMessage(data.reply);
                await loadConversations();  // 更新侧边栏标题
            } catch (err) {
                removeTyping();
                appendMessage('assistant', `✨ 出错了: ${err.message}`);
                console.error(err);
            } finally {
                isWaiting = false;
                sendBtn.classList.remove('disabled');
                messageInput.focus();
                scrollToBottom();
            }
        }

        // ==================== 事件绑定 ====================
        convListEl.addEventListener('click', e => {
            const titleSpan = e.target.closest('.conv-title');
            const deleteBtn = e.target.closest('.conv-delete');
            if (titleSpan) {
                const id = parseInt(titleSpan.dataset.id);
                if (id && id !== currentConvId) switchConversation(id);
            }
            if (deleteBtn) {
                e.stopPropagation();
                const id = parseInt(deleteBtn.dataset.id);
                if (id) deleteConversation(id);
            }
        });

        newChatBtn.addEventListener('click', async () => {
            await createNewConversation();
            clearMessagesUI();
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 130) + 'px';
        });
        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        sendBtn.addEventListener('click', handleSend);

        // ==================== 启动（无历史对话则自动创建） ====================
        async function init() {
            await loadConversations();
            if (conversations.length > 0) {
                await switchConversation(conversations[0].id);
            } else {
                // 没有任何对话 → 自动创建一个新对话，直接可聊天
                await createNewConversation();
                clearMessagesUI();
            }
            messageInput.focus();
        }

        init().catch(console.error);
        console.log('✨ 小可的茶会已就绪');
    })();
</script>
</body>
</html>
